name: Pickle-Power-Sports

services:
  postgres:
    image: postgres
    container_name: Pickle-Power-Sports-postgres
    environment:
      POSTGRES_DB: Pickle-Power-Sports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - Pickle-Power-Sports_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  Pickle-Power-Sports_postgres_data:
